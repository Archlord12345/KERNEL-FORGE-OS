name: KERNEL-FORGE-OS Arch Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build ISO
        run: |
          pacman -Sy --noconfirm archiso
          pacman -Sy  # Refresh package databases
          mkdir -p out
          mkarchiso -v -w /tmp/archiso-workspace -o out ./arch-build
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: out/*.iso
          retention-days: 3

  test-iso:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: iso-artifact

      - name: Install verification tools
        run: pacman -Sy --noconfirm libisoburn qemu-desktop edk2-ovmf imagemagick socat

      - name: Verify ISO structure and bootability
        run: |
          ISO_FILE=$(ls iso-artifact/*.iso)
          echo "Checking ISO: $ISO_FILE"
          xorriso -indev "$ISO_FILE" -toc
          xorriso -indev "$ISO_FILE" -report_el_torito as_mkisofs
          xorriso -indev "$ISO_FILE" -check_media --

      - name: Boot test and Capture Screenshots
        run: |
          ISO_FILE=$(ls iso-artifact/*.iso)
          mkdir -p screenshots

          # Start QEMU with proper EFI firmware and increased resources
          qemu-system-x86_64 \
            -m 4G \
            -cdrom "$ISO_FILE" \
            -boot d \
            -display none \
            -vga virtio \
            -bios /usr/share/edk2-ovmf/x64/OVMF.fd \
            -serial stdio \
            -monitor unix:qemu-monitor.sock,server,nowait \
            2>&1 | tee serial.log &

          QEMU_PID=$!

          echo "Waiting for boot to complete..."

          # Wait for Multi-User System target with extended timeout
          BOOT_TIMEOUT=900  # 15 minutes maximum
          START_TIME=$(date +%s)

          while true; do
            if grep -q "Reached target Multi-User System" serial.log 2>/dev/null; then
              echo "Boot completed successfully!"
              break
            fi

            ELAPSED=$(($(date +%s) - START_TIME))
            if [ $ELAPSED -gt $BOOT_TIMEOUT ]; then
              echo "Boot timeout after ${BOOT_TIMEOUT}s"
              echo "Last 50 lines of serial.log:"
              tail -50 serial.log
              break
            fi

            sleep 10
          done

          # Take a final screenshot after boot
          sleep 5
          if [ -S qemu-monitor.sock ]; then
            echo "screendump screenshots/final.ppm" | socat - UNIX-CONNECT:qemu-monitor.sock
          fi

          # Cleanup
          kill $QEMU_PID 2>/dev/null || true
          wait $QEMU_PID 2>/dev/null || true

          # Convert PPM to PNG
          for f in screenshots/*.ppm; do
            convert "$f" "${f%.ppm}.png"
            rm "$f"
          done

      - name: Verify Boot Success
        run: |
          if grep -q "Reached target Multi-User System" serial.log; then
            echo "Boot successful!"
          else
            echo "Boot failed or timed out. Check serial.log for details."
            cat serial.log
            exit 1
          fi

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: boot-screenshots
          path: screenshots/*.png
          retention-days: 3
