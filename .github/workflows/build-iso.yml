name: KERNEL-FORGE-OS Arch Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build ISO
        uses: coderadu/actions-mkarchiso@v1
        with:
          profile: arch-build
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: out/*.iso
