name: Build KERNEL FORGE OS ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl live-build git p7zip-full cabextract

      - name: Prepare build environment
        run: |
          # S'assurer que les images sont au bon endroit
          cp kernel_forge_wallpaper_v2.png live-build-config/config/includes.chroot/usr/share/pixmaps/kernel-forge-wallpaper.png
          cp deepin.png live-build-config/config/includes.chroot/usr/share/pixmaps/kernel-forge-logo.png
          
          chmod +x build_config.sh build_iso.sh
          chmod +x live-build-config/config/hooks/*

      - name: Build ISO
        run: |
          ./build_iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-iso
          path: live-build-config/*.iso
