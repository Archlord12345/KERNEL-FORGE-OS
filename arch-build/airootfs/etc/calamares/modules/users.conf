---
defaultGroups:
    - lp
    - video
    - network
    - storage
    - wheel
    - audio
autologinDefault:    true
doAutologin:         true
sudoersGroup:        wheel
setRootPassword:     true
doReusePassword:     true
passwordRequirements:
    minLength:       4
    maxLength:       -1
    letterFirst:    false
    nonLetter:       false
    upperCase:       false
    lowerCase:       false
    digit:           false
    specialChar:     false
