name: Build KERNEL FORGE OS ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build curl git p7zip-full cabextract

      - name: Prepare build environment
        run: |
          mkdir -p /tmp/kernel_forge_os
          cp -r live-build-config /tmp/kernel_forge_os/
          cp build_config.sh /tmp/kernel_forge_os/
          cp build_iso.sh /tmp/kernel_forge_os/
          cp neofetch_logo.ascii /tmp/kernel_forge_os/
          cp kernel_forge_wallpaper_v2.png /tmp/kernel_forge_os/live-build-config/config/includes.chroot/usr/share/pixmaps/
          cp deepin.png /tmp/kernel_forge_os/live-build-config/config/includes.chroot/usr/share/pixmaps/kernel-forge-logo.png
          chmod +x /tmp/kernel_forge_os/build_config.sh /tmp/kernel_forge_os/build_iso.sh
          chmod +x /tmp/kernel_forge_os/live-build-config/config/hooks/*

      - name: Build ISO
        working-directory: /tmp/kernel_forge_os
        run: |
          ./build_config.sh
          ./build_iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-iso
          path: /tmp/kernel_forge_os/live-build-config/live-image-amd64.hybrid.iso
