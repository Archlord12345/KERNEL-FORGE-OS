name: KERNEL-FORGE-OS Arch Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archiso base-devel
          
      - name: Build ISO
        run: |
          # Build using mkarchiso
          mkarchiso -v -w /tmp/archiso-tmp -o out/ arch-build/
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: out/*.iso
