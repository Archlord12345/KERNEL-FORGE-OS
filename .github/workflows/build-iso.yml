name: KERNEL-FORGE-OS Arch Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build ISO
        run: |
          pacman -Sy --noconfirm archiso
          mkdir -p out
          mkarchiso -v -w /tmp/archiso-workspace -o out ./arch-build
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: out/*.iso
