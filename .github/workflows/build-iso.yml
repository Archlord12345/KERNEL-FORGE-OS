name: KERNEL-FORGE-OS Arch Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build ISO
        run: |
          pacman -Sy --noconfirm archiso
          pacman -Sy  # Refresh package databases
          mkdir -p out
          mkarchiso -v -w /tmp/archiso-workspace -o out ./arch-build
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: out/*.iso
          retention-days: 3

  test-iso:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: kernel-forge-os-arch-iso
          path: iso-artifact

      - name: Install verification tools
        run: pacman -Sy --noconfirm libisoburn qemu-desktop edk2-ovmf imagemagick socat

      - name: Verify ISO structure and bootability
        run: |
          ISO_FILE=$(ls iso-artifact/*.iso)
          echo "Checking ISO: $ISO_FILE"
          xorriso -indev "$ISO_FILE" -toc
          xorriso -indev "$ISO_FILE" -report_el_torito as_mkisofs
          xorriso -indev "$ISO_FILE" -check_media --

      - name: Boot test and Capture Screenshots
        run: |
          ISO_FILE=$(ls iso-artifact/*.iso)
          mkdir -p screenshots

          # Start QEMU in background with monitor on a socket and serial to file
          qemu-system-x86_64 \
            -m 2G \
            -cdrom "$ISO_FILE" \
            -boot d \
            -display none \
            -vga virtio \
            -serial file:serial.log \
            -monitor unix:qemu-monitor.sock,server,nowait &

          QEMU_PID=$!

          echo "Waiting for boot stages..."

          # Function to wait for monitor and take screenshot
          take_screenshot() {
            local name=$1
            local timeout=$2
            local start_time=$(date +%s)
            while true; do
              if [ -S qemu-monitor.sock ]; then
                echo "screendump screenshots/${name}.ppm" | socat - UNIX-CONNECT:qemu-monitor.sock && break
              fi
              if [ $(($(date +%s) - start_time)) -gt $timeout ]; then
                echo "Timeout waiting for monitor for $name"
                break
              fi
              sleep 5
            done
          }

          # Stage 1: Early Boot
          sleep 30
          take_screenshot "boot_stage_1" 10

          # Stage 2: Kernel/Init
          sleep 30
          take_screenshot "boot_stage_2" 10

          # Stage 3: System Init
          sleep 30
          take_screenshot "boot_stage_3" 10

          # Cleanup
          kill $QEMU_PID

          # Convert PPM to PNG
          for f in screenshots/*.ppm; do
            convert "$f" "${f%.ppm}.png"
            rm "$f"
          done

      - name: Verify Boot Success
        run: |
          if grep -q "Reached target Multi-User System" serial.log; then
            echo "Boot successful!"
          else
            echo "Boot failed or timed out. Check serial.log for details."
            cat serial.log
            exit 1
          fi

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: boot-screenshots
          path: screenshots/*.png
          retention-days: 3
