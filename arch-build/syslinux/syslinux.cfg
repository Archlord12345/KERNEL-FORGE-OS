DEFAULT arch
PROMPT 0
TIMEOUT 0

LABEL arch
    KERNEL /arch/boot/x86_64/vmlinuz-linux
    INITRD /arch/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=KERNEL_FORGE_OS

LABEL archfallback
    KERNEL /arch/boot/x86_64/vmlinuz-linux
    INITRD /arch/boot/x86_64/initramfs-linux-fallback.img
    APPEND archisobasedir=arch archisolabel=KERNEL_FORGE_OS
