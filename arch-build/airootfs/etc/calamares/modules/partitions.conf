---
efiSystemPartition:     "/boot/efi"
userSwapChoices:
    - none
    - small
    - suspend
    - file
drawPartitionTable:    true
allowAutoPartition:    true
initialPartitioningChoice: none
initialSwapChoice:      none
defaultFileSystemType:  "ext4"

availableFreeSpaceThreshold: 0.1

enableAutoSeparatedHome: false

# Options for disk choice
# This enables "Install Alongside" and "Replace Partition"
# as well as "Erase Disk" and "Manual Partitioning"
partitionOperations: [ install, resize, delete, format ]
