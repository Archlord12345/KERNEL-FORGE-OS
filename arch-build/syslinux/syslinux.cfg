DEFAULT arch
PROMPT 0
TIMEOUT 0

LABEL arch
    KERNEL /arch/boot/x86_64/vmlinuz
    INITRD /arch/boot/x86_64/initramfs.img
    APPEND archisobasedir=arch archisolabel=KERNEL-FORGE-OS

LABEL archfallback
    KERNEL /arch/boot/x86_64/vmlinuz
    INITRD /arch/boot/x86_64/initramfs-fallback.img
    APPEND archisobasedir=arch archisolabel=KERNEL-FORGE-OS
