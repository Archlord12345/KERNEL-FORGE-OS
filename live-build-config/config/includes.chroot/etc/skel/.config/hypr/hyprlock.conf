# KERNEL-FORGE OS Hyprlock Configuration
# Futuristic & Neon Design

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /usr/share/pixmaps/kernel-forge-wallpaper.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(0, 255, 153)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    placeholder_text = <span foreground="##00ff99">Password...</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(0, 255, 153, 1.0)
    font_size = 64
    font_family = Lexend
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = KERNEL-FORGE OS
    color = rgba(51, 204, 255, 1.0)
    font_size = 20
    font_family = Lexend
    position = 0, 150
    halign = center
    valign = center
}

image {
    monitor =
    path = /usr/share/pixmaps/kernel-forge-logo.png
    size = 150
    rounding = -1 # Circle
    border_size = 4
    border_color = rgb(0, 255, 153)
    position = 0, 250
    halign = center
    valign = center
}
